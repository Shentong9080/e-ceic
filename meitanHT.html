        -webkit-transition: all .3s;

    }

        border-color: #eee
    }

    .layui-input {
        line-height: 1.3;
        border-width: 1px;
        border-style: solid;
        background-color: #fff;
        border-radius: 2px
    }

    .layui-input::-webkit-input-placeholder,
    .layui-select::-webkit-input-placeholder,
    .layui-textarea::-webkit-input-placeholder {
        line-height: 1.3
    }

    .layui-input {
        display: block;
        width: 100%;
        padding-left: 10px
    }

    .layui-form-item {
        position: relative;
        clear: both
    }

    .layui-form-item:after {
        content: " ";
        clear: both;
        *zoom: 1;
        display: block;
        height: 0

        position: relative;
        float: left;
        display: block;
        font-weight: 400;
        line-height: 20px;
        text-align: right
    }

    .layui-form-select {
        position: relative;
        color: #5f5f5f
    }

    .layui-form-select .layui-input {
        padding-right: 30px;
        cursor: pointer
    }

    .layui-form-select .layui-edge {
        position: absolute;
        right: 10px;
        top: 50%;
        margin-top: -3px;

        border-width: 6px;

        border-top-style: solid;
        transition: all .3s;
        -webkit-transition: all .3s

        }

        .mem_head_new {
            width: 100%;
            text-align: left;
            position: fixed;
            background-color: #fff;
            z-index: 10;
            box-shadow: 0px 0px 10px rgba(208, 208, 208, 0.4)
        }

        .header-fixed {
            min-height: 56px;
            width: 100%
        }

        .mem_head_main_new {
            margin: 0 auto;
            padding: 0 16px
        }

        .mem_info_new {
            display: flex;
            align-items: center;
            height: 56px
        }

        .mem_logo_new {
            width: 200px;
            margin-right: 40px
        }

        .nav-top-logo-new {
            width: 100%
        }

        .menu_list_new {
            flex: 1;
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            max-width: 900px
        }

        .menu_list_new a {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.9);
            position: relative;
            font-weight: 600
        }

        .menu_list_new a:hover {
            font-size: 14px;
            color: #eb5457;
            text-decoration: none !important
        }

        .menu_list_new li {
            position: relative;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 8px 0 8px
        }

        .menu_list_new li:first-child {
            padding-left: 4px
        }

        .menu_list_new li.on a:before {
            content: " " !important;
            display: inline-block !important;
            position: absolute !important;
            height: 2px !important;
            width: 50% !important;
            bottom: -8px !important;
            left: 50% !important;
            transform: translate(-50%, -50%);
            background: #EB5457 !important
        }

        .mem_info_right_new {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            flex-shrink: 0;
            margin-left: auto
        }

        .mem_info_right_new_info {
            display: flex;
            align-items: center;
            margin-right: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-left: 16px
        }

        .mem_info_right_new_member {
            position: relative;
            display: flex;
            align-items: center;
            font-size: 14px;
            cursor: pointer
        }

        .info_img {
            width: 20px;
            margin-right: 8px
        }

        .on a {
            color: #eb5457
        }

        #member_main {
            padding-top: 0 !important
        }
